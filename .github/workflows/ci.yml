name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Python import smoke test
        run: |
          python -m compileall src airflow
      - name: Validate notebooks are valid JSON
        run: |
          python - <<'PY'
          import json
          for path in ["notebooks/forecasting.ipynb", "notebooks/data_quality_checks.ipynb"]:
              with open(path) as f:
                  json.load(f)
          print("Notebook validation passed")
          PY
      - name: SQL sanity checks
        run: |
          test -s DECISIONS.md
          test -s sql/core.sql
          test -s sql/schema.sql
          test -s sql/marts.sql
          test -s sql/semantic_metrics.sql
          test -s sql/tests.sql
          test -s sql/warehouse_admin.sql
          test -s models/schema.yml
          test -s src/ingestion/api_ingest.py
          test -s src/ingestion/file_ingest.py
          test -s src/streaming/booking_events_consumer.py
          find models -name "*.sql" | sort
