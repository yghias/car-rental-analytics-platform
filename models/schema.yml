version: 2

sources:
  - name: raw
    description: Immutable landed source records and external table references.
    tables:
      - name: bookings
        description: Raw reservation payloads from the booking source system.
      - name: fleet_inventory
        description: Raw fleet master and snapshot extracts.
      - name: customers
        description: Raw customer profile records.
      - name: locations
        description: Raw branch and location reference records.
      - name: pricing_events
        description: Raw pricing and rate override records.
      - name: maintenance_events
        description: Raw maintenance and work-order extracts.

models:
  - name: stg_bookings
    description: Typed booking records standardized from the raw reservation feed.
    columns:
      - name: booking_id
        tests: [not_null, unique]
      - name: pickup_location_id
        tests: [not_null]
      - name: return_location_id
        tests: [not_null]
      - name: booking_status
        tests:
          - accepted_values:
              values: ["booked", "cancelled", "checked_out", "checked_in", "extended"]

  - name: stg_fleet_inventory
    description: Typed fleet snapshot records with standardized vehicle class and status values.
    columns:
      - name: vehicle_id
        tests: [not_null]
      - name: current_location_id
        tests: [not_null]

  - name: stg_pricing_events
    description: Typed pricing event records with effective windows for location, class, and channel analysis.
    columns:
      - name: pricing_event_id
        tests: [not_null, unique]
      - name: rate_amount
        tests: [not_null]

  - name: fact_booking
    description: Booking-grain mart used for booking analytics and downstream revenue logic.
    columns:
      - name: booking_id
        tests: [not_null, unique]
      - name: location_id
        tests: [not_null]

  - name: fact_vehicle_utilization
    description: Vehicle-day utilization fact used for supply and downtime analysis.
    columns:
      - name: snapshot_date
        tests: [not_null]
      - name: vehicle_id
        tests: [not_null]

  - name: fact_revenue
    description: Revenue mart aligned to booking service dates for financial and yield reporting.
    columns:
      - name: realized_revenue_amount
        tests: [not_null]

  - name: dim_customer
    description: Conformed customer dimension for loyalty and country-level reporting.
    columns:
      - name: customer_id
        tests: [not_null]

  - name: dim_date
    description: Date dimension derived from booking activity dates.
    columns:
      - name: calendar_date
        tests: [not_null, unique]

  - name: dim_vehicle_class
    description: Distinct rentable vehicle classes exposed to reporting marts.
    columns:
      - name: vehicle_class
        tests: [not_null, unique]

  - name: mart_branch_daily_performance
    description: Branch-day revenue and supply mart for operations and executive review.
    columns:
      - name: service_date
        tests: [not_null]
      - name: location_id
        tests: [not_null]

  - name: mart_booking_conversion
    description: Booking conversion and cancellation mart by service date, branch, and vehicle class.
    columns:
      - name: booking_conversion_rate
        tests: [not_null]

  - name: mart_pricing_performance
    description: Pricing performance mart with prior-day comparisons and revenue deltas.
    columns:
      - name: service_date
        tests: [not_null]

  - name: mart_revenue_summary
    description: Revenue summary mart aggregating booking and realized revenue by branch and class.
    columns:
      - name: realized_revenue_amount
        tests: [not_null]

  - name: mart_channel_mix
    description: Booking channel mix mart with ranked contribution by branch, class, and day.
    columns:
      - name: booking_channel_rank
        tests: [not_null]

  - name: mart_downtime_exposure
    description: Maintenance downtime and cost exposure mart by location and vehicle class.
    columns:
      - name: impacted_vehicle_count
        tests: [not_null]

  - name: mart_location_forecast_gap
    description: Forecast-versus-actual mart for branch and class level demand variance.
    columns:
      - name: forecast_error
        tests: [not_null]

  - name: mart_executive_scorecard
    description: Executive scorecard combining operational, revenue, and forecast metrics at branch-day grain.
    columns:
      - name: service_date
        tests: [not_null]

  - name: mart_booking_lead_time
    description: Booking lead-time mart summarizing how far in advance reservations are made.
    columns:
      - name: avg_booking_lead_days
        tests: [not_null]

  - name: mart_customer_segment_performance
    description: Customer segment performance mart by loyalty tier, geography, and vehicle class.
    columns:
      - name: booking_count
        tests: [not_null]

  - name: mart_fleet_capacity_risk
    description: Capacity risk mart comparing booking pace against available fleet supply.
    columns:
      - name: capacity_risk_status
        tests: [not_null]

  - name: mart_regional_revenue_trends
    description: Regional revenue trend mart with prior-period comparison logic.
    columns:
      - name: realized_revenue_amount
        tests: [not_null]

  - name: mart_vehicle_idle_days
    description: Vehicle-day idle exposure mart supporting utilization optimization.
    columns:
      - name: idle_vehicle_day_flag
        tests: [not_null]
